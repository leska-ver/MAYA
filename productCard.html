    <!-- AJAX - Чтобы сайт не прыгал, нужно отправлять форму без перезагрузки страницы. ОН должен стоят после ваших скриптов, но до закрывающего тега </body>. -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
      // Ловим любые формы, которые отправляются на mail.php ИЛИ mail-NoLoga.php
      const forms = document.querySelectorAll('form[action*="mail.php"], form[action*="mail-NoLoga.php"]');

      forms.forEach(form => {
        form.addEventListener('submit', function(e) {
          e.preventDefault(); // Останавливаем обычную отправку

          const formData = new FormData(this);

          fetch(this.action, {
            method: 'POST',
            body: formData
          })
          .then(response => {
            if (response.ok) {
              // Показываем сообщение об успехе
              const message = document.createElement('div');
              message.className = 'success-message';
              message.textContent = '👍 Спасибо! Данные отправлены.';
              message.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #BF7691; color: white; padding: 15px 25px; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999; animation: slideIn 0.3s ease;';
              
              document.body.appendChild(message);
              
              // Убираем сообщение через 3 секунды
              setTimeout(() => message.remove(), 3000);
              
              // Очищаем поле email (если есть)
              const emailInput = this.querySelector('input[name="email"]');
              if (emailInput) emailInput.value = '';
            } else {
              alert('❌ Ошибка при отправке');
            }
          })
          .catch(error => {
            console.error('Ошибка:', error);
            alert('❌ Произошла ошибка');
          });
        });
      });
    });
    </script>
